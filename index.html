<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link id="theme" rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">Nextora.</div>
            
            <div class="nav-links">
                <a href="#" id="home">Home</a>
                <a href="#" id="a-us">About Us</a>
                <a href="#" id="ser">Services</a>
                <a href="#" id="pro">Projects</a>
                <a href="#" id="blog">Blog</a>
                <a href="#" id="night-mode">night</a>
            </div>

            <div class="nav-buttons">
                <button class="btn-login" id="login">Log in</button>
                <button class="btn-signup" id="sign">Sign up</button>
            </div>
        </nav>

        <!-- Hero Section -->
        <div class="hero">
            <div class="hero-content">
                <h1>Empower Your Business with Modern Solutions</h1>
                
                <p class="hero-description">
                    Drive growth, enhance productivity, and achieve more with our innovative services tailored for modern enterprises.
                </p>

                <div class="cta-buttons">
                    <button class="btn-primary" id="get-start">Get Started</button>
                    <button class="btn-secondary" id="explor">Explore Services</button>
                </div>

                <div class="partners">
                    <div class="partner">
                        <div class="partner-icon"></div>
                        <span>Ovalism</span>
                    </div>
                    <div class="partner">
                        <div class="partner-icon"></div>
                        <span>Orbital</span>
                    </div>
                    <div class="partner">
                        <span>webflow</span>
                    </div>
                    <div class="partner">
                        <div class="partner-icon"></div>
                    </div>
                </div>
            </div>

            <div class="hero-image">
                <div class="image-wrapper">
                    <img src="assets/pexels-a-darmel-7862511.jpg" alt="Professional woman working on laptop">
                    
                    <div class="badge">
                        <div class="badge-icon">
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                        <span>Active 5k Members</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/script.js"></script>
</body>
</html>
